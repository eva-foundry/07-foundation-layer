[pytest]
# Pytest configuration for EVA Foundation automation tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --strict-markers
    --tb=short
    --disable-warnings
    
# Coverage options (when using pytest-cov)
# Run with: pytest --cov=. --cov-report=html

# Custom markers
markers =
    integration: Integration tests requiring external services (deselect with '-m "not integration"')
    slow: Slow tests (deselect with '-m "not slow"')

# Minimum Python version
minversion = 7.4

# Test paths
testpaths = .

# Coverage fail threshold (80%)
# Run with: pytest --cov=. --cov-fail-under=80
